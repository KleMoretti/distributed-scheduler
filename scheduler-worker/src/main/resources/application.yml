server:
  port: 8082

spring:
  application:
    name: scheduler-worker
  datasource:
    url: jdbc:mysql://localhost:3306/distributed_scheduler?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      auto-offset-reset: latest

scheduler:
  kafka:
    topic: scheduler_job_topic
    group: worker-group
  worker:
    id: worker-1
    address: 127.0.0.1:8082
  callback:
    host: 127.0.0.1
    port: 19090
